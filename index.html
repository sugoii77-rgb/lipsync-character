<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 립싱크 캐릭터</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a14; color: #fff;
  font-family: 'Segoe UI', Tahoma, sans-serif;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 16px; gap: 14px;
}
h1 {
  font-size: 19px; font-weight: 700;
  background: linear-gradient(135deg, #c084fc, #60a5fa, #f472b6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
#wrap {
  width: 420px; height: 460px; border-radius: 28px;
  border: 1px solid rgba(192,132,252,0.18);
  box-shadow: 0 0 80px rgba(192,132,252,0.12), 0 0 0 1px rgba(255,255,255,0.04);
  overflow: hidden; position: relative; background: #0d0d1a;
}
canvas { display: block; image-rendering: -webkit-optimize-contrast; }
#level-wrap {
  position: absolute; bottom: 12px; left: 14px; right: 14px;
  height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px;
  overflow: hidden; opacity: 0; transition: opacity 0.3s;
}
#level-wrap.show { opacity: 1; }
#level-bar { height: 100%; width: 0%; background: linear-gradient(90deg,#60a5fa,#c084fc,#f472b6); }
.panel { width: 420px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 18px; overflow: hidden; }
.tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.07); }
.tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; color: rgba(255,255,255,0.38); border: none; background: none; transition: all 0.2s; }
.tab.active { color: #c084fc; border-bottom: 2px solid #c084fc; margin-bottom: -1px; }
.tb { display: none; padding: 14px; flex-direction: column; gap: 11px; }
.tb.active { display: flex; }
textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(192,132,252,0.25); border-radius: 11px; color: #fff; padding: 10px 13px; font-size: 13.5px; line-height: 1.6; resize: vertical; min-height: 78px; font-family: inherit; }
textarea:focus { outline: none; border-color: #c084fc; }
textarea::placeholder { color: rgba(255,255,255,0.25); }
.row { display: flex; gap: 9px; align-items: center; }
select { flex: 1; background: rgba(0,0,0,0.35); border: 1px solid rgba(192,132,252,0.22); border-radius: 10px; color: #fff; padding: 8px 10px; font-size: 12.5px; cursor: pointer; }
select:focus { outline: none; border-color: #c084fc; }
select option { background: #1a1a2e; }
label { font-size: 12px; color: rgba(255,255,255,0.42); white-space: nowrap; }
button { padding: 10px 15px; border: none; border-radius: 11px; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all 0.18s; }
.btn-p { flex: 1; background: linear-gradient(135deg,#c084fc,#818cf8); color:#fff; box-shadow:0 4px 16px rgba(192,132,252,0.22); }
.btn-p:hover { opacity:0.9; transform:translateY(-1px); }
.btn-p.speaking { background: linear-gradient(135deg,#f472b6,#c084fc); animation: pulse 1.1s ease-in-out infinite; }
.btn-s { background: rgba(255,255,255,0.07); color:rgba(255,255,255,0.6); border:1px solid rgba(255,255,255,0.1); }
.btn-s:hover { background:rgba(255,255,255,0.11); }
.btn-live { width:100%; padding:13px; border-radius:13px; font-size:14px; background: linear-gradient(135deg,#34d399,#059669); color:#fff; }
.btn-live:hover { opacity:0.9; transform:translateY(-1px); }
.btn-live.on { background: linear-gradient(135deg,#f87171,#dc2626); animation:pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.72} }
.sbar { display:flex; align-items:center; gap:8px; font-size:12px; color:rgba(255,255,255,0.36); }
.dot { width:7px; height:7px; border-radius:50%; background:#4ade80; flex-shrink:0; }
.dot.on { background:#f472b6; animation:blink .8s ease-in-out infinite; }
.dot.live { background:#34d399; animation:blink .6s ease-in-out infinite; }
.dot.err { background:#f87171; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.22} }
.mtabs { display:flex; gap:8px; }
.mt { flex:1; padding:8px; border:1px solid rgba(255,255,255,0.1); border-radius:9px; background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.48); font-size:12.5px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.mt.active { background:rgba(192,132,252,0.14); border-color:#c084fc; color:#c084fc; }
.ibox { background:rgba(96,165,250,0.07); border:1px solid rgba(96,165,250,0.16); border-radius:11px; padding:11px 13px; font-size:12.5px; line-height:1.7; color:rgba(255,255,255,0.6); }
.ibox strong { color:#93c5fd; }
.ibox ol { padding-left:16px; margin-top:5px; }
.srow { display:flex; align-items:center; gap:9px; }
input[type=range] { flex:1; accent-color:#c084fc; cursor:pointer; }
.sv { font-size:12px; color:rgba(255,255,255,0.36); width:24px; text-align:right; }
#fq { width:100%; height:44px; border-radius:8px; background:rgba(0,0,0,0.18); display:none; }
#fq.show { display:block; }
</style>
</head>
<body>
<h1>✨ AI 립싱크 캐릭터</h1>

<div id="wrap">
  <canvas id="cv" width="420" height="460"></canvas>
  <div id="level-wrap"><div id="level-bar"></div></div>
</div>

<div class="panel">
  <div class="tabs">
    <button class="tab active" onclick="ST('tts')">🎙️ TTS 모드</button>
    <button class="tab" onclick="ST('live')">🔴 Live 모드</button>
  </div>

  <div class="tb active" id="t-tts">
    <textarea id="txt" placeholder="텍스트를 입력하세요... (Ctrl+Enter)">안녕하세요! 저는 AI 립싱크 캐릭터예요. 말하기 버튼을 눌러보세요!</textarea>
    <div class="row">
      <label>목소리</label>
      <select id="vsel"><option value="-1">로딩 중...</option></select>
      <label>속도</label>
      <select id="spd">
        <option value="0.75">느리게</option>
        <option value="1.0" selected>기본</option>
        <option value="1.25">빠르게</option>
        <option value="1.5">매우 빠르게</option>
      </select>
    </div>
    <div class="row">
      <button class="btn-p" id="spk-btn" onclick="speak()">🎙️ 말하기</button>
      <button class="btn-s" onclick="stopSpeak()">⏹ 멈추기</button>
    </div>
    <div class="sbar"><div class="dot" id="tts-dot"></div><span id="tts-st">준비됨 — Ctrl+Enter로 빠르게</span></div>
  </div>

  <div class="tb" id="t-live">
    <div class="mtabs">
      <button class="mt active" id="mt-mic" onclick="SM('mic')">🎤 마이크</button>
      <button class="mt" id="mt-scr" onclick="SM('screen')">🖥️ 화면 공유</button>
    </div>
    <div id="m-mic">
      <div class="ibox"><strong>실시간 오디오 립싱크</strong><br>스테레오 믹스 활성화 시 PC 전체 소리 캡처 가능.</div>
      <div class="row"><label>입력 장치</label><select id="msel"><option value="">기본 마이크</option></select><button class="btn-s" style="padding:7px 10px;font-size:12px" onclick="refreshMics()">↻</button></div>
    </div>
    <div id="m-scr" style="display:none">
      <div class="ibox">⚠️ <strong>이 창이 아닌</strong> AI가 말하는 다른 창을 선택하세요.<ol><li>다른 AI 탭 / 전체 화면 선택</li><li><strong>"시스템 오디오 공유"</strong> 체크 ✓</li><li>공유 클릭</li></ol></div>
    </div>
    <canvas id="fq" width="392" height="44"></canvas>
    <div class="srow"><label>민감도</label><input type="range" id="sens" min="15" max="180" value="55"><span class="sv" id="sv">55</span></div>
    <button class="btn-live" id="live-btn" onclick="toggleCap()">🎤 마이크 입력 시작</button>
    <div class="sbar"><div class="dot" id="live-dot"></div><span id="live-st">대기 중</span></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  CANVAS + STATE
// ════════════════════════════════════════════════════════
const cv = document.getElementById('cv');
const g  = cv.getContext('2d');
const W=420, H=460;
// Character center — slightly up so hair fits
const CX=210, CY=220;

// Global animation state
const S = {
  // Viseme (0=rest,1=A,2=I,3=U,4=E,5=O)
  viseme: 0, visemeT: 0,
  openness: 0, opennessT: 0,
  wideRatio: 0, wideRatioT: 0.5,
  // Eye
  blink: 0, blinkTimer: 3000, blinking: false,
  glX: 0, glY: 0, glTimer: 0,
  // Body
  bob: 0, bobT: 0,
  breath: 0, breathT: 0,
  speaking: false,
  cheek: 0.22,
};

const lerp = (a,b,t) => a + (b-a)*Math.min(t,1);
const ease = t => t<0.5 ? 2*t*t : -1+(4-2*t)*t;

// ── Off-screen buffer for anti-aliasing ──
const off = document.createElement('canvas');
off.width = W*2; off.height = H*2;
const og = off.getContext('2d');

// ════════════════════════════════════════════════════════
//  DRAW CHARACTER
// ════════════════════════════════════════════════════════
function render() {
  og.clearRect(0,0,W*2,H*2);
  og.save();
  og.scale(2,2);

  // Background gradient
  const bg = og.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#111128'); bg.addColorStop(1,'#0d0d1a');
  og.fillStyle=bg; og.fillRect(0,0,W,H);

  // Ambient rim glow
  const glow = og.createRadialGradient(CX,CY-20,30,CX,CY-20,230);
  glow.addColorStop(0,'rgba(180,120,255,0.06)'); glow.addColorStop(1,'transparent');
  og.fillStyle=glow; og.fillRect(0,0,W,H);

  const bob = Math.sin(S.bobT)*( S.speaking ? 1.8 : 0.6 );
  const brth = Math.sin(S.breathT)*1.0;
  og.save(); og.translate(0, bob+brth);

  drawShadow();
  drawBodyClothes();
  drawNeck();
  drawHairBack();
  drawFace();
  drawEars();
  drawBrows();
  drawEyes();
  drawNose();
  drawMouth();
  drawCheeks();
  drawHairFront();
  drawHairDetail();
  drawAccessory();

  og.restore();
  og.restore();

  // Blit to main canvas (2x → 1x = natural AA)
  g.clearRect(0,0,W,H);
  g.drawImage(off, 0,0, W*2,H*2, 0,0, W,H);
}

/* ── Shadow under character ── */
function drawShadow() {
  og.save();
  og.fillStyle = 'rgba(0,0,0,0.18)';
  og.beginPath(); og.ellipse(CX+4, CY+5, 95, 108, 0, 0, Math.PI*2); og.fill();
  og.restore();
}

/* ── Body / Clothes ── */
function drawBodyClothes() {
  og.save();
  // Shoulders
  const sg = og.createLinearGradient(CX-120,CY+90,CX+120,H+20);
  sg.addColorStop(0,'#3d2c8a'); sg.addColorStop(0.5,'#2e1f6e'); sg.addColorStop(1,'#1a1050');
  og.fillStyle=sg;
  og.beginPath();
  og.moveTo(CX-130,H+10);
  og.bezierCurveTo(CX-135,CY+160, CX-80,CY+88, CX-40,CY+78);
  og.bezierCurveTo(CX-15,CY+72, CX,CY+70, CX,CY+70);
  og.bezierCurveTo(CX,CY+70, CX+15,CY+72, CX+40,CY+78);
  og.bezierCurveTo(CX+80,CY+88, CX+135,CY+160, CX+130,H+10);
  og.closePath(); og.fill();

  // Collar area
  og.fillStyle='#f2f0ff';
  og.beginPath();
  og.moveTo(CX-32,CY+88);
  og.lineTo(CX,CY+128); og.lineTo(CX+32,CY+88);
  og.lineTo(CX+20,CY+80); og.lineTo(CX,CY+102); og.lineTo(CX-20,CY+80);
  og.closePath(); og.fill();

  // Left collar shading
  og.fillStyle='rgba(200,195,240,0.9)';
  og.beginPath();
  og.moveTo(CX-68,CY+84); og.lineTo(CX-20,CY+80);
  og.lineTo(CX,CY+128); og.lineTo(CX-80,CY+108);
  og.closePath(); og.fill();

  // Right collar shading
  og.fillStyle='rgba(175,170,215,0.9)';
  og.beginPath();
  og.moveTo(CX+68,CY+84); og.lineTo(CX+20,CY+80);
  og.lineTo(CX,CY+128); og.lineTo(CX+80,CY+108);
  og.closePath(); og.fill();

  og.restore();
}

/* ── Neck ── */
function drawNeck() {
  og.save();
  const ng = og.createLinearGradient(CX-22,0,CX+22,0);
  ng.addColorStop(0,'#f2c4a2'); ng.addColorStop(0.45,'#fdd6b8'); ng.addColorStop(1,'#edb890');
  og.fillStyle=ng;
  og.beginPath();
  og.moveTo(CX-18,CY+60); og.lineTo(CX+18,CY+60);
  og.lineTo(CX+22,CY+88); og.lineTo(CX-22,CY+88);
  og.closePath(); og.fill();
  // Neck shadow
  og.fillStyle='rgba(160,100,60,0.08)';
  og.beginPath(); og.ellipse(CX+8,CY+74,10,16,0.2,0,Math.PI*2); og.fill();
  og.restore();
}

/* ── Face ── */
function drawFace() {
  og.save();

  // Base skin
  const fg = og.createRadialGradient(CX-30,CY-30,8, CX,CY,110);
  fg.addColorStop(0,'#ffe4c8');
  fg.addColorStop(0.45,'#fdd4b2');
  fg.addColorStop(0.8,'#f5c4a0');
  fg.addColorStop(1,'#eeaa8a');
  og.fillStyle=fg;
  og.beginPath();
  og.ellipse(CX,CY,92,106,0,0,Math.PI*2);
  og.fill();

  // Chin highlight
  const chin = og.createRadialGradient(CX,CY+85,5,CX,CY+85,55);
  chin.addColorStop(0,'rgba(255,235,215,0.45)');
  chin.addColorStop(1,'transparent');
  og.fillStyle=chin; og.beginPath(); og.ellipse(CX,CY+85,55,28,0,0,Math.PI*2); og.fill();

  // Forehead highlight
  const fh = og.createRadialGradient(CX,CY-60,5,CX,CY-60,60);
  fh.addColorStop(0,'rgba(255,250,240,0.35)');
  fh.addColorStop(1,'transparent');
  og.fillStyle=fh; og.beginPath(); og.ellipse(CX,CY-60,60,35,0,0,Math.PI*2); og.fill();

  // Jaw definition
  og.fillStyle='rgba(220,150,110,0.12)';
  og.beginPath();
  og.moveTo(CX-72,CY+15);
  og.bezierCurveTo(CX-85,CY+65, CX-40,CY+105, CX,CY+106);
  og.bezierCurveTo(CX+40,CY+105, CX+85,CY+65, CX+72,CY+15);
  og.bezierCurveTo(CX+40,CY+30, CX-40,CY+30, CX-72,CY+15);
  og.closePath(); og.fill();

  og.restore();
}

/* ── Ears ── */
function drawEars() {
  og.save();
  [[-89,-0.15],[89,0.15]].forEach(([ex,t])=>{
    const eg = og.createRadialGradient(CX+ex,CY,5,CX+ex,CY,18);
    eg.addColorStop(0,'#f5c8a8'); eg.addColorStop(1,'#ecb898');
    og.fillStyle=eg;
    og.beginPath(); og.ellipse(CX+ex,CY-2,12,16,t,0,Math.PI*2); og.fill();
    // inner ear
    og.fillStyle='rgba(220,110,90,0.25)';
    og.beginPath(); og.ellipse(CX+ex,CY,6,9,t,0,Math.PI*2); og.fill();
  });
  og.restore();
}

/* ── Eyebrows ── */
function drawBrows() {
  og.save();
  const by = CY-52;
  // Left brow
  const lb = og.createLinearGradient(CX-55,by,CX-10,by);
  lb.addColorStop(0,'rgba(80,45,140,0.85)');
  lb.addColorStop(1,'rgba(90,50,150,0.6)');
  og.strokeStyle=lb; og.lineWidth=3.8; og.lineCap='round';
  og.beginPath(); og.moveTo(CX-53,by+3); og.bezierCurveTo(CX-36,by-5,CX-20,by-2,CX-10,by+1); og.stroke();

  // Right brow
  const rb = og.createLinearGradient(CX+10,by,CX+55,by);
  rb.addColorStop(0,'rgba(90,50,150,0.6)');
  rb.addColorStop(1,'rgba(80,45,140,0.85)');
  og.strokeStyle=rb;
  og.beginPath(); og.moveTo(CX+10,by+1); og.bezierCurveTo(CX+20,by-2,CX+36,by-5,CX+53,by+3); og.stroke();
  og.restore();
}

/* ── Eyes ── */
function drawEyes() {
  og.save();
  const ey=CY-17, gx=S.glX*5, gy=S.glY*2;
  const bl=S.blink;

  [-1,1].forEach(side=>{
    const ex=CX+side*31;

    og.save();
    // Clip to eye shape for clean rendering
    og.beginPath();
    og.ellipse(ex,ey,21,(22*(1-bl)),0,0,Math.PI*2);
    og.clip();

    // Sclera (white)
    const sc=og.createRadialGradient(ex-5,ey-8,0,ex,ey,24);
    sc.addColorStop(0,'#ffffff'); sc.addColorStop(0.7,'#f5f8ff'); sc.addColorStop(1,'#e8eeff');
    og.fillStyle=sc; og.beginPath(); og.ellipse(ex,ey,21,22*(1-bl),0,0,Math.PI*2); og.fill();

    // Upper shadow in eye
    const es=og.createLinearGradient(ex,ey-22,ex,ey-5);
    es.addColorStop(0,'rgba(130,90,210,0.35)'); es.addColorStop(1,'transparent');
    og.fillStyle=es; og.fillRect(ex-22,ey-24,44,20);

    // Iris base
    const iris=og.createRadialGradient(ex+gx-4,ey+gy-6,1, ex+gx,ey+gy,15);
    iris.addColorStop(0,'#7fd4f8');
    iris.addColorStop(0.3,'#48a8ee');
    iris.addColorStop(0.6,'#2278cc');
    iris.addColorStop(0.85,'#1050a0');
    iris.addColorStop(1,'#0a2860');
    og.fillStyle=iris;
    og.beginPath(); og.ellipse(ex+gx,ey+gy,14,15*(1-bl),0,0,Math.PI*2); og.fill();

    // Iris texture ring
    og.strokeStyle='rgba(0,60,160,0.25)'; og.lineWidth=1;
    og.beginPath(); og.ellipse(ex+gx,ey+gy,10,10*(1-bl),0,0,Math.PI*2); og.stroke();

    // Pupil
    og.fillStyle='#060f22';
    og.beginPath(); og.ellipse(ex+gx+0.5,ey+gy+1,6.5,7*(1-bl),0,0,Math.PI*2); og.fill();

    // Main catchlight (large)
    og.fillStyle='rgba(255,255,255,0.96)';
    og.beginPath(); og.ellipse(ex+gx-5,ey+gy-6,4.5,4.5,0,0,Math.PI*2); og.fill();
    // Secondary catchlight
    og.fillStyle='rgba(255,255,255,0.7)';
    og.beginPath(); og.ellipse(ex+gx+5,ey+gy+1,2.5,2.5,0,0,Math.PI*2); og.fill();
    // Tiny sparkle
    og.fillStyle='rgba(200,230,255,0.5)';
    og.beginPath(); og.ellipse(ex+gx-2,ey+gy+5,1.5,1.5,0,0,Math.PI*2); og.fill();

    // Limbal ring
    og.strokeStyle='rgba(10,20,80,0.4)'; og.lineWidth=1.5;
    og.beginPath(); og.ellipse(ex+gx,ey+gy,13,14*(1-bl),0,0,Math.PI*2); og.stroke();

    og.restore();

    // Upper eyelid (drawn outside clip)
    if(bl<0.7){
      og.save();
      og.strokeStyle='#160430'; og.lineWidth=2.5; og.lineCap='round';
      og.beginPath();
      og.moveTo(ex-22,ey+2);
      og.bezierCurveTo(ex-14,ey-22*(1-bl)-4, ex+12,ey-22*(1-bl)-2, ex+22,ey+2);
      og.stroke();

      // Lashes
      og.strokeStyle='rgba(15,3,40,0.85)'; og.lineWidth=1.8;
      const lashY=ey-20*(1-bl);
      for(let i=-3;i<=3;i++){
        const lx=ex+i*6.5, ang=-0.3+i*0.08;
        og.beginPath(); og.moveTo(lx,lashY); og.lineTo(lx+Math.sin(ang)*5, lashY-Math.cos(ang)*7); og.stroke();
      }
      og.restore();
    }

    // Lower lash line
    og.save();
    og.strokeStyle='rgba(100,50,160,0.3)'; og.lineWidth=1.2;
    og.beginPath();
    og.moveTo(ex-18,ey+20*(1-bl));
    og.bezierCurveTo(ex,ey+22*(1-bl)+2, ex+18,ey+20*(1-bl), ex+18,ey+20*(1-bl));
    og.stroke();
    og.restore();

    // Blink overlay
    if(bl>0.05){
      og.save();
      og.beginPath(); og.rect(ex-26,ey-28,52,28+24*bl); og.clip();
      const bov=og.createLinearGradient(ex,ey-8,ex,ey+18*bl);
      bov.addColorStop(0,'#fdd6b4'); bov.addColorStop(1,'#f5c4a0');
      og.fillStyle=bov; og.beginPath(); og.ellipse(ex,ey,26,28,0,0,Math.PI*2); og.fill();
      og.restore();
    }
  });
  og.restore();
}

/* ── Nose ── */
function drawNose() {
  og.save();
  const ny=CY+22;
  // Nose tip highlight
  og.fillStyle='rgba(255,235,215,0.4)';
  og.beginPath(); og.ellipse(CX,ny+5,7,5,0,0,Math.PI*2); og.fill();
  // Nostrils
  og.strokeStyle='rgba(190,110,80,0.45)'; og.lineWidth=1.5; og.lineCap='round';
  og.beginPath(); og.moveTo(CX-7,ny); og.quadraticCurveTo(CX-5,ny+6,CX-1,ny+5); og.stroke();
  og.beginPath(); og.moveTo(CX+7,ny); og.quadraticCurveTo(CX+5,ny+6,CX+1,ny+5); og.stroke();

}

/* ── Mouth — 5 viseme shapes ── */
function drawMouth() {
  og.save();
  const o = S.openness;     // 0–1: jaw drop
  const w = S.wideRatio;    // 0–1: lip stretch
  const my = CY+52;
  const cx2 = 20 + w*10;   // corner X spread
  const ulift = o*(2+w*4);  // upper lip rise

  const ulY = my - ulift;   // upper lip Y
  const llY = my + o*20;    // lower lip Y

  // ── Interior ──
  if(o > 0.04) {
    const cw=cx2-2+o*3, ch=Math.max((llY-ulY)*0.58,1);

    // Mouth cavity
    og.fillStyle='#110310';
    og.beginPath(); og.ellipse(CX,ulY+(llY-ulY)*0.44,cw,ch,0,0,Math.PI*2); og.fill();

    // Throat shadow
    if(o>0.35){
      const th=og.createRadialGradient(CX,ulY+ch*1.5,0,CX,ulY+ch*1.5,cw*0.7);
      th.addColorStop(0,'rgba(40,0,20,0.8)'); th.addColorStop(1,'transparent');
      og.fillStyle=th; og.beginPath(); og.ellipse(CX,ulY+ch*1.5,cw*0.7,ch*0.55,0,0,Math.PI*2); og.fill();
    }

    // Upper teeth
    if(o>0.06){
      const tw=cw-2, th2=Math.min(o*12+w*8,13);
      og.fillStyle='#fffaf8';
      og.beginPath(); og.ellipse(CX,ulY+2,tw,th2,0,Math.PI,2*Math.PI); og.fill();
      // Tooth dividers
      if(th2>5 && w>0.3){
        og.strokeStyle='rgba(200,185,190,0.35)'; og.lineWidth=0.8;
        [-tw*0.4,-tw*0.15,tw*0.15,tw*0.4].forEach(ox=>{
          og.beginPath(); og.moveTo(CX+ox,ulY+1); og.lineTo(CX+ox,ulY+1-th2*0.8); og.stroke();
        });
      }
    }

    // Lower teeth
    if(o>0.3 && w>0.2){
      const lh=Math.min((o-0.3)*15,10);
      og.fillStyle='#f8f0f3';
      og.beginPath(); og.ellipse(CX,llY*0.5+ulY*0.5+ch*0.55,cw-6,lh,0,0,Math.PI); og.fill();
    }

    // Tongue
    if(o>0.5){
      const ta=Math.min((o-0.5)/0.5,1);
      const tg=og.createRadialGradient(CX,ulY+(llY-ulY)*0.78,0,CX,ulY+(llY-ulY)*0.78,cw*0.5);
      tg.addColorStop(0,`rgba(225,85,100,${ta*0.92})`);
      tg.addColorStop(1,`rgba(200,55,75,${ta*0.7})`);
      og.fillStyle=tg;
      og.beginPath(); og.ellipse(CX,ulY+(llY-ulY)*0.78,cw*0.48*ta,ch*0.38*ta,0,0,Math.PI); og.fill();
    }
  }

  // ── Upper lip ──
  const ulg=og.createLinearGradient(CX,ulY-8,CX,ulY+4);
  ulg.addColorStop(0,'#c03868'); ulg.addColorStop(1,'#d04878');
  og.fillStyle=ulg;
  og.beginPath();
  og.moveTo(CX-cx2,ulY+2);
  // Left to left peak (Cupid's bow)
  og.bezierCurveTo(CX-cx2*0.62,ulY-5, CX-cx2*0.25,ulY-4, CX-4,ulY-8-o*2);
  // Dip center
  og.bezierCurveTo(CX-1.5,ulY-5, CX+1.5,ulY-5, CX+4,ulY-8-o*2);
  // Right peak to right
  og.bezierCurveTo(CX+cx2*0.25,ulY-4, CX+cx2*0.62,ulY-5, CX+cx2,ulY+2);
  // Lower edge
  og.bezierCurveTo(CX+cx2*0.5,ulY+1, CX,ulY+2, CX-cx2*0.5,ulY+1);
  og.closePath(); og.fill();

  // Upper lip gloss
  og.fillStyle='rgba(255,160,180,0.2)';
  og.beginPath();
  og.moveTo(CX-cx2*0.3,ulY-1); og.bezierCurveTo(CX-10,ulY-5,CX+10,ulY-5,CX+cx2*0.3,ulY-1);
  og.bezierCurveTo(CX+10,ulY+1, CX-10,ulY+1, CX-cx2*0.3,ulY-1); og.closePath(); og.fill();

  // ── Lower lip ──
  const llg=og.createLinearGradient(CX,ulY,CX,llY+14);
  llg.addColorStop(0,'#cc5075'); llg.addColorStop(0.6,'#d86088'); llg.addColorStop(1,'#c05070');
  og.fillStyle=llg;
  og.beginPath();
  og.moveTo(CX-cx2,ulY+2);
  og.bezierCurveTo(CX-cx2*0.5,ulY+9+o*16, CX+cx2*0.5,ulY+9+o*16, CX+cx2,ulY+2);
  og.bezierCurveTo(CX+cx2*0.55,llY+10, CX,llY+13, CX-cx2*0.55,llY+10);
  og.closePath(); og.fill();

  // Lower lip highlight
  og.fillStyle='rgba(255,190,210,0.38)';
  og.beginPath(); og.ellipse(CX+3,llY+8,10+w*4,4,0,0,Math.PI*2); og.fill();

  // Mouth corners
  og.fillStyle='#a82855';
  [-cx2,cx2].forEach(ox=>{og.beginPath();og.arc(CX+ox,ulY+2,2,0,Math.PI*2);og.fill();});

  og.restore();
}

//  ANIMATION LOOP
// ════════════════════════════════════════════════════════
let lastT=0, visT=0;

function loop(ts) {
  const dt=Math.min(ts-lastT,50); lastT=ts;

  // Timer updates
  S.breathT += dt*0.0008;
  S.bobT    += dt*0.0016*(S.speaking?1.9:0.5);

  // Blink
  S.blinkTimer -= dt;
  if(S.blinkTimer<=0 && !S.blinking){ S.blinkTimer=2000+Math.random()*4000; doBlink(); }

  // Eye glance
  S.glTimer -= dt;
  if(S.glTimer<=0){
    S.glTimer=2500+Math.random()*5000;
    S.glX=(Math.random()-0.5)*1.6;
    S.glY=(Math.random()-0.5)*0.5;
  }

  // Mouth smooth
  const atk=dt*0.02, rel=dt*0.009;
  S.openness  = lerp(S.openness,  S.opennessT,  S.opennessT >S.openness  ? atk : rel);
  S.wideRatio = lerp(S.wideRatio, S.wideRatioT, S.wideRatioT>S.wideRatio ? atk : rel*1.3);

  // TTS viseme cycling (when speaking without live audio)
  if(S.speaking && !liveCapturing){
    visT-=dt;
    if(visT<=0){
      visT=55+Math.random()*65;
      const picks=[0.08,0.2,0.4,0.6,0.75,0.9,0.5,0.3,0.7,0.15,0.85];
      S.opennessT  = picks[Math.floor(Math.random()*picks.length)];
      S.wideRatioT = 0.2+Math.random()*0.75;
    }
  } else if(!liveCapturing){
    S.opennessT=0; S.wideRatioT=0.5;
  }

  S.cheek = lerp(S.cheek, (S.speaking||liveCapturing)?0.5:0.22, dt*0.005);

  render();
  requestAnimationFrame(loop);
}

function doBlink(){
  S.blinking=true;
  const dur=120, st=performance.now();
  function f(t){const p=(t-st)/dur;S.blink=p<0.5?ease(p*2):ease((1-p)*2);if(p<1)requestAnimationFrame(f);else{S.blink=0;S.blinking=false;}}
  requestAnimationFrame(f);
}
requestAnimationFrame(loop);

// Viseme from text
function charV(ch){
  const c=ch.charCodeAt(0);
  if(c>=0xAC00&&c<=0xD7A3){
    const j=Math.floor((c-0xAC00)/28)%21;
    const m=[
      {o:.82,w:.88},{o:.52,w:.92},{o:.78,w:.85},{o:.48,w:.90},
      {o:.58,w:.52},{o:.50,w:.85},{o:.52,w:.54},{o:.46,w:.82},
      {o:.55,w:.18},{o:.70,w:.65},{o:.50,w:.72},{o:.46,w:.62},
      {o:.50,w:.20},{o:.40,w:.10},{o:.46,w:.45},{o:.42,w:.62},
      {o:.36,w:.28},{o:.38,w:.12},{o:.22,w:.62},{o:.30,w:.72},
      {o:.34,w:.94}
    ];
    return m[j]||{o:.14,w:.55};
  }
  switch(ch.toLowerCase()){
    case'a':return{o:.80,w:.88}; case'e':return{o:.50,w:.90};
    case'i':return{o:.30,w:.96}; case'o':return{o:.55,w:.16};
    case'u':return{o:.38,w:.08};
  }
  return /\s/.test(ch)?null:{o:.12,w:.52};
}

const synth=window.speechSynthesis; let utt=null, vt=null;

function loadV(){
  const s=document.getElementById('vsel');
  const vs=synth.getVoices(); if(!vs.length){setTimeout(loadV,300);return;}
  s.innerHTML=''; vs.forEach((v,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${v.name} (${v.lang})`;s.appendChild(o);});
  const ko=vs.findIndex(v=>v.lang.startsWith('ko')); if(ko>=0)s.value=ko;
}
synth.onvoiceschanged=loadV; loadV();

function setTS(t,m){document.getElementById('tts-st').textContent=t;document.getElementById('tts-dot').className='dot '+(m||'');document.getElementById('spk-btn').className='btn-p'+(m==='on'?' speaking':'');}

function speak(){
  const text=document.getElementById('txt').value.trim(); if(!text)return;
  if(synth.speaking)synth.cancel(); clearVT();
  utt=new SpeechSynthesisUtterance(text);
  const vs=synth.getVoices(); const vi=parseInt(document.getElementById('vsel').value);
  if(!isNaN(vi)&&vs[vi])utt.voice=vs[vi];
  utt.rate=parseFloat(document.getElementById('spd').value); utt.pitch=1.1;
  utt.onstart=()=>{S.speaking=true;setTS('말하는 중...','on');schedV(text,utt.rate);};
  utt.onend=()=>{S.speaking=false;S.opennessT=0;S.wideRatioT=.5;clearVT();setTS('완료 ✓','');setTimeout(()=>setTS('준비됨',''),2000);};
  utt.onerror=()=>{S.speaking=false;clearVT();setTS('오류','err');};
  synth.speak(utt);
}

function schedV(text,rate){
  const mpc=1000/(rate*5.5); const f=[]; let t=60;
  for(const ch of text){const v=charV(ch);if(v)f.push({at:t,...v});t+=/\s/.test(ch)?mpc*0.38:mpc;}
  const st=Date.now(); let i=0;
  vt=setInterval(()=>{
    if(!S.speaking||i>=f.length){clearVT();return;}
    const n=Date.now()-st;
    while(i<f.length&&f[i].at<=n){S.opennessT=f[i].o;S.wideRatioT=f[i].w;i++;}
  },16);
}
function clearVT(){if(vt){clearInterval(vt);vt=null;}}
function stopSpeak(){synth.cancel();S.speaking=false;S.opennessT=0;S.wideRatioT=.5;clearVT();setTS('멈춤','');}
document.getElementById('txt').addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter'){e.preventDefault();speak();}});

function setupA(s){actx=new AudioContext();const src=actx.createMediaStreamSource(s);analyser=actx.createAnalyser();analyser.fftSize=2048;analyser.smoothingTimeConstant=0.80;src.connect(analyser);freqD=new Uint8Array(analyser.frequencyBinCount);liveCapturing=true;fq.classList.add('show');lwrap.classList.add('show');doAnalyze();}

function stopCap(){liveCapturing=false;if(capStream){capStream.getTracks().forEach(t=>t.stop());capStream=null;}if(actx){actx.close();actx=null;}if(livRaf){cancelAnimationFrame(livRaf);livRaf=null;}S.opennessT=0;S.wideRatioT=.5;fq.classList.remove('show');lwrap.classList.remove('show');document.getElementById('live-btn').textContent=curM==='mic'?'🎤 마이크 입력 시작':'🖥️ 화면 공유로 캡처';document.getElementById('live-btn').className='btn-live';setLS('캡처 종료','');}
function doAnalyze(){if(!liveCapturing)return;livRaf=requestAnimationFrame(doAnalyze);analyser.getByteFrequencyData(freqD);const sr=actx.sampleRate,bin=sr/analyser.fftSize;const lo=Math.max(1,Math.floor(200/bin)),hi=Math.min(freqD.length-1,Math.floor(4000/bin));let s=0;for(let i=lo;i<=hi;i++)s+=freqD[i];const avg=s/(hi-lo+1);const loH=Math.max(1,Math.floor(1500/bin));let sh=0;for(let i=loH;i<=hi;i++)sh+=freqD[i];const avgH=sh/(hi-loH+1);const hiL=Math.floor(800/bin);let sl=0;for(let i=lo;i<=hiL;i++)sl+=freqD[i];const avgL=sl/(hiL-lo+1);const sens=parseFloat(document.getElementById('sens').value);if(avg<sens*0.26){S.opennessT=0;S.wideRatioT=.5;lbar.style.width='0%';drawFQ();return;}S.opennessT=Math.pow(Math.min(avg/sens,1),.58);const br=avgH/Math.max(avgL,1);S.wideRatioT=Math.max(.08,Math.min(.95,(br-.25)/.95));lbar.style.width=(S.opennessT*100)+'%';drawFQ();}
function drawFQ(){const fw=fq.width,fh=fq.height;fqg.clearRect(0,0,fw,fh);const bw=Math.ceil(fw/80),step=Math.floor(freqD.length/80);for(let i=0;i<80;i++){let v=0;for(let j=0;j<step;j++)v+=freqD[i*step+j];v/=step;const h=(v/255)*fh;fqg.fillStyle=`hsla(${200+i*1.8},78%,65%,0.85)`;fqg.fillRect(i*bw,fh-h,bw-1,h);}}

function ST(n){document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&n==='tts')||(i===1&&n==='live')));document.getElementById('t-tts').classList.toggle('active',n==='tts');document.getElementById('t-live').classList.toggle('active',n==='live');}
</script>
